# Rate limiting zone for API endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream stormapi_backend {
    server 127.0.0.1:8080;
}

# HTTP Server: Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.stormapi.dev;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.stormapi.dev;

    # SSL Certificate Configuration Placeholder
    ssl_certificate /etc/letsencrypt/live/api.stormapi.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stormapi.dev/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss: https:;" always;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Common Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API Proxy with Rate Limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://stormapi_backend;
        proxy_read_timeout 300s;
    }

    # WebSocket Proxy
    location /ws/ {
        proxy_pass http://stormapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # OAuth2 Authentication & Login Routes
    location /oauth2/ {
        proxy_pass http://stormapi_backend;
    }

    location /login/ {
        proxy_pass http://stormapi_backend;
    }

    # Actuator Health Route (Allowed)
    location /actuator/health {
        proxy_pass http://stormapi_backend;
    }

    # Actuator Restrict (Forbidden)
    location /actuator/ {
        return 403;
    }
}
