services:
  db:
    image: postgres:17-alpine
    container_name: stormapi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stormapi
      POSTGRES_USER: stormapi
      POSTGRES_PASSWORD: stormapi_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stormapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - stormapi-pgdata-dev:/var/lib/postgresql/data
    networks:
      - stormapi-net

  backend:
    build: ./backend
    container_name: stormapi-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_NAME: stormapi
      DB_USER: stormapi
      DB_PASSWORD: stormapi_dev
    networks:
      - stormapi-net

networks:
  stormapi-net:
    driver: bridge

volumes:
  stormapi-pgdata-dev:
