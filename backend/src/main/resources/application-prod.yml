spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:stormapi}
    username: ${DB_USER:stormapi}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user

logging:
  level:
    com.stormapi: INFO
    org.springframework.web: WARN

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://stormapi.yourdomain.com}
  auth:
    cookie-secure: true
    redirect-uri: ${FRONTEND_URL:https://stormapi.yourdomain.com}/dashboard
