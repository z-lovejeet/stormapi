server:
  shutdown: graceful

spring:
  threads:
    virtual:
      enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:stormapi}
    username: ${DB_USER:stormapi}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Using update for automatic schema management; will switch to validate + Flyway migrations in a future phase
      ddl-auto: update
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user

management:
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    com.stormapi: INFO
    org.springframework.web: WARN

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://stormapi.yourdomain.com}
  auth:
    cookie-secure: true
    redirect-uri: ${FRONTEND_URL:https://stormapi.yourdomain.com}/dashboard
