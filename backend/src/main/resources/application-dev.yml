spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:stormapi
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

logging:
  level:
    com.stormapi: DEBUG
    org.springframework.web: DEBUG
