spring:
  application:
    name: stormapi

  profiles:
    active: dev

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  max-http-request-header-size: 48KB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

jwt:
  secret: ${JWT_SECRET:stormapi-default-dev-secret-key-that-is-at-least-32-characters-long-for-hmac}
  expiration-ms: 86400000  # 24 hours
